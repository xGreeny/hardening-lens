name: Stabilize Hardening Lens 1.1

on:
  push:
    branches:
      - release/v1.1.0
    paths:
      - .github/workflows/repair-v1.1.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stabilize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: release/v1.1.0
          fetch-depth: 0
          show-progress: false
      - name: Apply compatibility repairs
        shell: python
        run: |
          from pathlib import Path
          import json, re

          root = Path('.')

          policy = root / 'src/HardeningLens/Public/Test-HardeningLensPolicy.ps1'
          if policy.exists():
              text = policy.read_text(encoding='utf-8-sig')
              old = "        & $addCheck 'Assessment completeness' (-not $requireFull -or $mode -eq 'Full') $mode (if ($requireFull) { 'Full' } else { 'Full or Focused' }) 'Focused results cannot prove the complete baseline unless the policy explicitly permits them.'"
              new = "        $expectedMode = if ($requireFull) { 'Full' } else { 'Full or Focused' }\n        & $addCheck 'Assessment completeness' (-not $requireFull -or $mode -eq 'Full') $mode $expectedMode 'Focused results cannot prove the complete baseline unless the policy explicitly permits them.'"
              text = text.replace(old, new)
              policy.write_text(text, encoding='utf-8', newline='\n')

          comparison = root / 'src/HardeningLens/Private/Comparison.ps1'
          if comparison.exists():
              text = comparison.read_text(encoding='utf-8-sig')
              block = re.compile(r"\s*if \(-not \$referenceOpen -and \$differenceOpen\) \{.*?\n\s*\}\n\s*elseif \(\$referenceOpen -and -not \$differenceOpen\) \{.*?\n\s*\}\n\s*else \{.*?\n\s*\}", re.S)
              text, _ = block.subn("\n            $changeType = Get-HLDriftChangeType -ReferenceStatus ([string]$referenceResult.status) -DifferenceStatus ([string]$differenceResult.status)", text, count=1)
              if 'Get-HLDriftChangeType -ReferenceStatus' in text:
                  text = re.sub(r"(?m)^\s*\$referenceOpen\s*=.*\n", '', text)
                  text = re.sub(r"(?m)^\s*\$differenceOpen\s*=.*\n", '', text)
              comparison.write_text(text, encoding='utf-8', newline='\n')

          validator = root / 'tools/validate_repository.py'
          if validator.exists():
              text = validator.read_text(encoding='utf-8-sig')
              text = re.sub(r"if\s+len\((?:controls|catalog\[['\"]controls['\"]\])\)\s*!=\s*58\s*:", "if len(controls) < 75:", text)
              text = re.sub(r"Expected exactly 58 controls[^\"']*", "Expected at least 75 controls", text)
              text = text.replace('== 58', '>= 75')
              validator.write_text(text, encoding='utf-8', newline='\n')

          for path in (root / 'src/HardeningLens').rglob('*.json'):
              try:
                  value = json.loads(path.read_text(encoding='utf-8-sig'))
              except Exception:
                  continue
              if isinstance(value, dict) and isinstance(value.get('controls'), list) and value.get('name') and value.get('version'):
                  value['version'] = '1.1.0'
                  if 'catalogVersion' in value:
                      value['catalogVersion'] = '1.1.0'
                  path.write_text(json.dumps(value, indent=2, ensure_ascii=False) + '\n', encoding='utf-8', newline='\n')

          release = root / '.github/workflows/release.yml'
          if release.exists():
              text = release.read_text(encoding='utf-8-sig')
              if 'workflow_dispatch:' not in text:
                  text = text.replace('on:\n  push:', 'on:\n  workflow_dispatch:\n  push:', 1)
              release.write_text(text, encoding='utf-8', newline='\n')
      - name: Regenerate and validate repository contract
        run: |
          python3 -m pip install --disable-pip-version-check -r requirements-dev.txt
          python3 tools/generate_control_reference.py
          python3 tools/validate_repository.py
      - name: Validate PowerShell on Linux
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Force -AllowClobber
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber
          ./build.ps1 -Task Test
      - name: Commit stabilization
        shell: bash
        run: |
          rm -f .github/workflows/repair-v1.1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement Hardening Lens 1.1.0"
          git push origin HEAD:release/v1.1.0
