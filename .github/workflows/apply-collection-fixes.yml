name: Apply collection compatibility fixes

on:
  push:
    branches:
      - fix/quality-gate

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/quality-gate
          fetch-depth: 0
          show-progress: false
      - name: Apply source fixes
        run: python tools/apply_collection_fixes.py
      - name: Commit source fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          if git diff --cached --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git commit -m "fix: materialize generic collections safely"
          git push origin HEAD:fix/quality-gate
