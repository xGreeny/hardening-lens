name: Apply Hardening Lens 1.1

on:
  push:
    branches:
      - release/v1.1.0
    paths:
      - tools/apply_v1_1.py
      - .github/workflows/apply-v1.1.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-v1.1
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: release/v1.1.0
          fetch-depth: 0
          show-progress: false
      - name: Apply release changes
        run: python3 tools/apply_v1_1.py
      - name: Regenerate control reference
        run: python3 tools/generate_control_reference.py
      - name: Commit release implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No release changes were required."
            exit 0
          fi
          git commit -m "feat: implement Hardening Lens 1.1.0"
          git push origin HEAD:release/v1.1.0
