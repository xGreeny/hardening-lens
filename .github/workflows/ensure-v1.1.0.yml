name: Ensure Hardening Lens 1.1.0

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ensure-v1.1.0.yml
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *"

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

concurrency:
  group: ensure-hardening-lens-v1.1.0
  cancel-in-progress: false

env:
  RELEASE_BRANCH: release/v1.1.0
  RELEASE_VERSION: 1.1.0

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      sha: ${{ steps.target.outputs.sha }}
      needs_merge: ${{ steps.target.outputs.needs_merge }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          show-progress: false
      - name: Select and normalize release candidate
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          current_version=$(pwsh -NoLogo -NoProfile -Command "(Test-ModuleManifest ./src/HardeningLens/HardeningLens.psd1).Version.ToString()")
          if [[ "$current_version" == "$RELEASE_VERSION" ]]; then
            git checkout -B main origin/main
            echo "needs_merge=false" >> "$GITHUB_OUTPUT"
          else
            pr_state=$(gh pr view 5 --json state --jq '.state')
            if [[ "$pr_state" == "CLOSED" ]]; then
              gh pr reopen 5
            fi
            git fetch origin "$RELEASE_BRANCH"
            git checkout -B "$RELEASE_BRANCH" "origin/$RELEASE_BRANCH"
            echo "needs_merge=true" >> "$GITHUB_OUTPUT"
          fi

          candidate_version=$(pwsh -NoLogo -NoProfile -Command "(Test-ModuleManifest ./src/HardeningLens/HardeningLens.psd1).Version.ToString()")
          if [[ "$candidate_version" != "$RELEASE_VERSION" ]]; then
            echo "Release branch is not ready: module version is $candidate_version." >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          required = [
              root / 'ROADMAP.md',
              root / 'src/HardeningLens/Public/Test-HardeningLensResult.ps1',
              root / 'src/HardeningLens/Public/Test-HardeningLensPolicy.ps1',
              root / 'src/HardeningLens/Public/Invoke-HardeningLensFleet.ps1',
              root / 'src/HardeningLens/Schema/policy.schema.json',
              root / 'examples/production-policy.json',
              root / 'examples/fleet-inventory.json',
          ]
          missing = [str(path) for path in required if not path.is_file()]
          if missing:
              raise SystemExit('Missing 1.1 release files: ' + ', '.join(missing))

          catalog = json.loads((root / 'src/HardeningLens/Data/control-catalog.json').read_text(encoding='utf-8-sig'))
          controls = {item['id'] for item in catalog['controls']}
          required_controls = {
              'HL-TLS-001', 'HL-TLS-002', 'HL-TLS-003', 'HL-NETBIOS-001',
              'HL-FW-003', 'HL-FW-004', 'HL-UAC-003', 'HL-CREDSSP-001',
              'HL-MSI-001', 'HL-DC-003', 'HL-HVCI-001', 'HL-DEF-006',
              'HL-AUD-007', 'HL-AUD-008', 'HL-RDS-001', 'HL-RDS-002', 'HL-RDS-003',
          }
          absent = sorted(required_controls - controls)
          if absent:
              raise SystemExit('Missing 1.1 controls: ' + ', '.join(absent))
          if len(controls) < 75:
              raise SystemExit(f'Expected at least 75 controls, found {len(controls)}')
          PY

          if [[ "$current_version" != "$RELEASE_VERSION" ]]; then
            rm -f .github/workflows/apply-v1.1*.yml
            rm -f .github/workflows/validate-v1.1.yml
            rm -f .github/workflows/merge-v1.1.yml
            rm -f .github/workflows/repair-v1.1.yml
            rm -f .github/workflows/postfix-v1.1.yml
            rm -f .github/workflows/exports-v1.1.yml
            rm -f .github/workflows/repository-export.yml
            rm -f tools/apply_v1_1*.py
            rm -rf .v1.1-payload
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "build: finalize Hardening Lens 1.1.0 release candidate"
              git push origin HEAD:"$RELEASE_BRANCH"
            fi
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  repository-contract:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          show-progress: false
      - run: python3 -m pip install --disable-pip-version-check -r requirements-dev.txt
      - run: python3 tools/generate_control_reference.py --check
      - run: python3 tools/validate_repository.py

  powershell-linux:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          show-progress: false
      - shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable Pester | Where-Object Version -ge 5.6.1)) { Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Force -AllowClobber }
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) { Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber }
          ./build.ps1 -Task Test

  windows-powershell:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          show-progress: false
      - shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable Pester | Where-Object Version -ge 5.6.1)) { Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck }
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) { Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck }
          .\build.ps1 -Task Test

  merge-build-release:
    needs: [prepare, repository-contract, powershell-linux, windows-powershell]
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          show-progress: false
      - name: Merge validated release candidate
        if: needs.prepare.outputs.needs_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          gh pr ready 5 2>$null
          gh pr merge 5 --squash --subject 'feat: release Hardening Lens 1.1.0' --body 'Operational-trust release with explicit assessment scope, policy gates, reliable fleet execution, modern Windows controls, safer drift semantics, and release provenance.'
      - name: Check out final main and remove release automation
        shell: powershell
        run: |
          git fetch origin main --tags
          git checkout -B main origin/main
          Remove-Item -LiteralPath '.github/workflows/ensure-v1.1.0.yml' -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath '.github/workflows/publish-v1.1-finalize.yml' -Force -ErrorAction SilentlyContinue
          Get-ChildItem -LiteralPath '.github/workflows' -Filter '*v1.1*.yml' -ErrorAction SilentlyContinue | Remove-Item -Force
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if (-not (git diff --cached --quiet)) {
            git commit -m 'build: finalize Hardening Lens 1.1.0 publication'
            git push origin HEAD:main
          }
      - name: Validate final main
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $manifest = Test-ModuleManifest .\src\HardeningLens\HardeningLens.psd1
          if ($manifest.Version.ToString() -ne '1.1.0') { throw "Final main is version $($manifest.Version), expected 1.1.0." }
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python tools/generate_control_reference.py --check
          python tools/validate_repository.py
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable Pester | Where-Object Version -ge 5.6.1)) { Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck }
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) { Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck }
          .\build.ps1 -Task All
          .\tools\New-ReleaseMetadata.ps1 -ArtifactsDirectory .\artifacts -SourceCommit (git rev-parse HEAD)
      - name: Attest module archive
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/HardeningLens-1.1.0.zip
      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          $finalSha = (git rev-parse HEAD).Trim()
          git fetch origin --tags
          if (-not (git tag --list v1.1.0)) {
            git tag -a v1.1.0 $finalSha -m 'Hardening Lens 1.1.0'
            git push origin v1.1.0
          }
          $assets = @(
            'artifacts/HardeningLens-1.1.0.zip',
            'artifacts/HardeningLens-1.1.0.zip.sha256',
            'artifacts/build-manifest.json',
            'artifacts/sbom.spdx.json'
          )
          gh release view v1.1.0 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload v1.1.0 @assets --clobber
          }
          else {
            gh release create v1.1.0 @assets --title 'Hardening Lens 1.1.0' --generate-notes --verify-tag
          }
