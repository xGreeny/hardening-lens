name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    name: Repository contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Validate generated documentation
        run: python tools/generate_control_reference.py --check
      - name: Validate schemas and repository invariants
        run: python tools/validate_repository.py

  powershell-core:
    name: PowerShell 7 / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - name: Install test modules
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository PSGallery -InstallationPolicy Trusted

          $pester = Get-Module -ListAvailable -Name Pester |
            Where-Object { $_.Version -ge [version]'5.6.1' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if ($null -eq $pester) {
            Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Repository PSGallery -Force -AllowClobber -ErrorAction Stop
          }

          $analyzer = Get-Module -ListAvailable -Name PSScriptAnalyzer |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if ($null -eq $analyzer) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force -AllowClobber -ErrorAction Stop
          }
      - name: Validate and test
        shell: pwsh
        run: |
          $logPath = Join-Path $PWD 'build-pwsh.log'
          try {
            & ./build.ps1 -Task Test *>&1 | Tee-Object -FilePath $logPath
          }
          catch {
            $_ | Format-List * -Force | Out-String | Tee-Object -FilePath $logPath -Append | Write-Host
            throw
          }
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-pwsh
          path: |
            build-pwsh.log
            TestResults.xml
            artifacts/coverage.xml
          if-no-files-found: ignore

  windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - name: Install test modules
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository PSGallery -InstallationPolicy Trusted

          $pester = Get-Module -ListAvailable -Name Pester |
            Where-Object { $_.Version -ge [version]'5.6.1' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if ($null -eq $pester) {
            Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Repository PSGallery -Force -AllowClobber -SkipPublisherCheck -ErrorAction Stop
          }

          $analyzer = Get-Module -ListAvailable -Name PSScriptAnalyzer |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if ($null -eq $analyzer) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force -AllowClobber -SkipPublisherCheck -ErrorAction Stop
          }
      - name: Validate and test
        shell: powershell
        run: |
          $logPath = Join-Path $PWD 'build-windows-powershell.log'
          try {
            & .\build.ps1 -Task Test *>&1 | Tee-Object -FilePath $logPath
          }
          catch {
            $_ | Format-List * -Force | Out-String | Tee-Object -FilePath $logPath -Append | Write-Host
            throw
          }
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows-powershell
          path: |
            build-windows-powershell.log
            TestResults.xml
            artifacts/coverage.xml
          if-no-files-found: ignore
