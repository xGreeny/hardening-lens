name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    name: Repository contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install schema validator
        run: python -m pip install -r requirements-dev.txt
      - name: Validate generated documentation
        run: python tools/generate_control_reference.py --check
      - name: Validate schemas and repository invariants
        run: python tools/validate_repository.py

  powershell-core:
    name: PowerShell 7 / Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install test modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Validate and test
        shell: pwsh
        run: ./build.ps1 -Task Test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pwsh
          path: |
            TestResults.xml
            artifacts/coverage.xml
          if-no-files-found: ignore

  windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install test modules
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Validate and test
        shell: powershell
        run: .\build.ps1 -Task Test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows-powershell
          path: |
            TestResults.xml
            artifacts/coverage.xml
          if-no-files-found: ignore
