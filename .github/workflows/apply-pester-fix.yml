name: Apply Pester configuration fix

on:
  push:
    branches:
      - fix/quality-gate

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/quality-gate
          fetch-depth: 0
          show-progress: false
      - name: Apply Pester configuration fix
        run: python tools/apply_pester_configuration_fix.py
      - name: Commit source fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build.ps1
          if git diff --cached --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git commit -m "fix: configure Pester tag filtering correctly"
          git push origin HEAD:fix/quality-gate
