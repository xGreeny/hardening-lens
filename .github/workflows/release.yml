name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate for tagged commit
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read

  release:
    name: Package and publish
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify release version
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $manifest = Test-ModuleManifest .\src\HardeningLens\HardeningLens.psd1
          $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
          if ($manifest.Version.ToString() -ne $tagVersion) {
            throw "Tag version $tagVersion does not match module version $($manifest.Version)."
          }
      - name: Package tagged source
        shell: powershell
        run: .\build.ps1 -Task Package
      - name: Smoke-test package / Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $zipPath = Join-Path $PWD "artifacts\HardeningLens-$version.zip"
          $hashPath = "$zipPath.sha256"
          $expectedHash = ((Get-Content -LiteralPath $hashPath -Raw).Trim() -split '\s+')[0]
          $actualHash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash
          if ($actualHash -cne $expectedHash) {
            throw "Package checksum mismatch: expected $expectedHash, found $actualHash."
          }

          $extractRoot = Join-Path $env:RUNNER_TEMP "hardening-lens-package-windows-powershell-$version"
          if (Test-Path -LiteralPath $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractRoot
          $manifestPath = Join-Path $extractRoot "HardeningLens\$version\HardeningLens.psd1"
          $manifest = Test-ModuleManifest -Path $manifestPath -ErrorAction Stop
          if ($manifest.Version.ToString() -ne $version) {
            throw "Packaged manifest version $($manifest.Version) does not match $version."
          }

          Import-Module -Name $manifestPath -Force -ErrorAction Stop
          $expected = @(
            'Compare-HardeningLensResult'
            'Export-HardeningLensReport'
            'Get-HardeningLensBaseline'
            'Get-HardeningLensControl'
            'Invoke-HardeningLens'
            'Invoke-HardeningLensFleet'
            'New-HardeningLensExceptionFile'
            'Set-HardeningLensException'
            'Test-HardeningLensBaseline'
            'Test-HardeningLensExceptionFile'
            'Test-HardeningLensPolicy'
          ) | Sort-Object
          $actual = @(Get-Command -Module HardeningLens -CommandType Function | Select-Object -ExpandProperty Name | Sort-Object)
          if (($actual -join ',') -cne ($expected -join ',')) {
            throw "Packaged module exports differ from the public contract: $($actual -join ', ')."
          }
      - name: Smoke-test package / PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $zipPath = Join-Path $PWD "artifacts\HardeningLens-$version.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "hardening-lens-package-pwsh-$version"
          if (Test-Path -LiteralPath $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractRoot
          $manifestPath = Join-Path $extractRoot "HardeningLens\$version\HardeningLens.psd1"
          $manifest = Test-ModuleManifest -Path $manifestPath -ErrorAction Stop
          if ($manifest.Version.ToString() -ne $version) {
            throw "Packaged manifest version $($manifest.Version) does not match $version."
          }
          $module = Import-Module -Name $manifestPath -Force -PassThru -ErrorAction Stop
          if (-not $module.ModuleBase.StartsWith($extractRoot, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Imported module did not come from the extracted release package: $($module.ModuleBase)."
          }
      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          gh release create '${{ github.ref_name }}' `
            "artifacts/HardeningLens-$version.zip" `
            "artifacts/HardeningLens-$version.zip.sha256" `
            --title "Hardening Lens $version" `
            --generate-notes `
            --verify-tag
