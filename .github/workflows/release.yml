name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Install PowerShell test modules
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository PSGallery -InstallationPolicy Trusted

          $pester = Get-Module -ListAvailable -Name Pester |
            Where-Object { $_.Version -ge [version]'5.6.1' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if ($null -eq $pester) {
            Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Repository PSGallery -Force -AllowClobber -SkipPublisherCheck -ErrorAction Stop
          }

          $analyzer = Get-Module -ListAvailable -Name PSScriptAnalyzer |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if ($null -eq $analyzer) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force -AllowClobber -SkipPublisherCheck -ErrorAction Stop
          }
      - name: Verify release version
        shell: powershell
        run: |
          $manifest = Test-ModuleManifest .\src\HardeningLens\HardeningLens.psd1
          $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
          if ($manifest.Version.ToString() -ne $tagVersion) {
            throw "Tag version $tagVersion does not match module version $($manifest.Version)."
          }
      - name: Validate repository
        run: |
          python tools/generate_control_reference.py --check
          python tools/validate_repository.py
      - name: Test and package
        shell: powershell
        run: .\build.ps1 -Task All
      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          gh release create '${{ github.ref_name }}' `
            "artifacts/HardeningLens-$version.zip" `
            "artifacts/HardeningLens-$version.zip.sha256" `
            --title "Hardening Lens $version" `
            --generate-notes `
            --verify-tag
