<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Hardening Lens social preview</title>
  <desc id="desc">Read-only Windows security posture assessment with role-aware baselines, evidence, exceptions, and drift.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06110c"/>
      <stop offset="0.58" stop-color="#0a1a12"/>
      <stop offset="1" stop-color="#123825"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#55e69d" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#55e69d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#55e69d" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="26"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/></filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1100" cy="110" r="360" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="210" cy="650" r="300" fill="url(#glow)" opacity="0.42" filter="url(#blur)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="76" y="82" fill="#55e69d" font-size="17" font-weight="700" letter-spacing="4">XGREENY / WINDOWS SECURITY ENGINEERING</text>
    <text x="74" y="177" fill="#eff9f3" font-size="68" font-weight="800" letter-spacing="1.5">HARDENING LENS</text>
    <text x="78" y="222" fill="#a7c2b3" font-size="23">effective state  /  evidence  /  governed exceptions  /  drift</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="74" y="274" width="756" height="196" rx="18" fill="#07100b" stroke="#2b5b40" stroke-width="1.5"/>
    <rect x="74" y="274" width="756" height="42" rx="18" fill="#0e2017"/>
    <circle cx="102" cy="295" r="5" fill="#ff6b6b"/>
    <circle cx="122" cy="295" r="5" fill="#ffc857"/>
    <circle cx="142" cy="295" r="5" fill="#55e69d"/>
    <text x="168" y="301" fill="#7ea791" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">hardening-lens / assessment</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">
      <text x="103" y="353" fill="#55e69d">PS&gt;</text>
      <text x="151" y="353" fill="#d8e9df">Invoke-HardeningLens -Baseline MemberServer</text>
      <text x="103" y="395" fill="#8aa595">[PASS 40] [FAIL 7] [WARN 3] [EXCEPTED 1]</text>
      <text x="103" y="431" fill="#8aa595">score 77.1%  /  evidence coverage 96.2%  /  read-only</text>
    </g>
  </g>

  <g transform="translate(920 276)">
    <circle cx="118" cy="98" r="101" fill="#07100b" stroke="#2b5b40" stroke-width="2"/>
    <circle cx="118" cy="98" r="74" fill="none" stroke="#55e69d" stroke-width="10"/>
    <circle cx="118" cy="98" r="56" fill="none" stroke="#55e69d" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 8"/>
    <path d="M172 154l62 62" fill="none" stroke="#55e69d" stroke-width="15" stroke-linecap="round"/>
    <path d="M82 98h72M118 62v72" fill="none" stroke="#55e69d" stroke-opacity="0.20"/>
    <text x="118" y="96" text-anchor="middle" fill="#eff9f3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">EVIDENCE</text>
    <text x="118" y="119" text-anchor="middle" fill="#7ea791" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">NOT ASSUMPTIONS</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    <rect x="74" y="521" width="194" height="42" rx="21" fill="#0c1b14" stroke="#244434"/>
    <text x="171" y="548" text-anchor="middle" fill="#cfe4d8">58 controls</text>
    <rect x="284" y="521" width="220" height="42" rx="21" fill="#0c1b14" stroke="#244434"/>
    <text x="394" y="548" text-anchor="middle" fill="#cfe4d8">4 role baselines</text>
    <rect x="520" y="521" width="215" height="42" rx="21" fill="#0c1b14" stroke="#244434"/>
    <text x="627" y="548" text-anchor="middle" fill="#cfe4d8">PowerShell 5.1 + 7</text>
    <rect x="751" y="521" width="190" height="42" rx="21" fill="#0c1b14" stroke="#244434"/>
    <text x="846" y="548" text-anchor="middle" fill="#cfe4d8">JSON schemas</text>
    <rect x="957" y="521" width="247" height="42" rx="21" fill="#0c1b14" stroke="#244434"/>
    <text x="1080" y="548" text-anchor="middle" fill="#cfe4d8">HTML / JSON / CSV</text>
  </g>

  <text x="76" y="601" fill="#668575" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">github.com/xGreeny/hardening-lens</text>
</svg>
